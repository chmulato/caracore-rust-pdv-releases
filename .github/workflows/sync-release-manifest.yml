name: Sync release manifest

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update release manifest
        run: python tools/sync_release_manifest.py --owner chmulato --repo caracore-pdv-releases

      - name: Commit if changed
        run: |
          if git diff --quiet -- docs/assets/data/release-latest.json; then
            echo "Sem mudanças no manifesto."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/data/release-latest.json
          git commit -m "chore: sync release manifest"
          git push
